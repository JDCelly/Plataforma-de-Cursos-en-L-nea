# ============================================================
# Docker Compose — Sistema de Gestión Académica
# ============================================================
#
# ARRANQUE COMPLETO (sin pasos manuales):
#   docker compose up --build
#
#   El backend ejecuta automáticamente `prisma migrate deploy`
#   antes de arrancar gracias al entrypoint.sh.
#
# FLUJO DE DESARROLLO RECOMENDADO (hot-reload local):
#
#   1. Solo DB en Docker:
#        docker compose up db
#
#   2. Migraciones Prisma (desde backend/):
#        npx prisma migrate dev       ← crea y aplica en desarrollo
#        npx prisma migrate deploy    ← solo aplica en producción
#        npx prisma generate          ← regenerar cliente
#
#   3. Backend local (desde backend/):
#        npm run start:dev            → http://localhost:3001
#
#   4. Frontend local (desde frontend/):
#        npm run dev                  → http://localhost:3000
#
# Variables de entorno: copiar .env.example → .env antes de empezar.
# ============================================================

services:
  # ── Base de datos PostgreSQL ──────────────────────────────
  db:
    image: postgres:16-alpine        # Imagen oficial ligera de PostgreSQL 16
    container_name: gestion-avanzada-db
    restart: unless-stopped
    env_file:
      - .env                          # Carga POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:                      # Verifica que PostgreSQL esté listo antes de arrancar el backend
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend NestJS ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestion-avanzada-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # URL de conexión a PostgreSQL usando el nombre del servicio "db" como host
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      - db
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/api/v1/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - ./backend:/app                # Hot-reload: cambios locales se reflejan al instante
      - /app/node_modules             # Evita sobreescribir node_modules del contenedor

  # ── Frontend Next.js ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gestion-avanzada-frontend
    restart: unless-stopped
    environment:
      # URL del backend que el navegador usará para llamadas fetch
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
    ports:
      - '3000:3000'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app               # Hot-reload para desarrollo frontend
      - /app/node_modules
      - /app/.next                    # Evita conflictos con la carpeta de build

# ── Volúmenes con nombre ──────────────────────────────────────
volumes:
  postgres_data:
